  no_china_brand: {rule: true, source: "契約§8(24)+需求書備註3", enforcement: "逐項品牌+產地驗證"}
  no_china_made: {rule: true, source: "需求書備註3", enforcement: "含零組件（RAM/SSD/LTE模組）"}
  no_cross_border: {rule: true, source: "契約§8(24)", enforcement: "資料所在地切結書+連線查核配合"}
  cns_27001: {rule: true, source: "契約§8(23)", enforcement: "資安防護基準查核表"}
  no_china_subcontractor: {rule: true, source: "契約§8(六)1", enforcement: "分包廠商國別審查"}
  traditional_chinese: {rule: true, source: "契約§1(5)", enforcement: "禁止簡體字元，包含AI回覆"}
  license_continuation: {rule: "契約期滿未續購，可繼續使用到期前最後更新版本", source: "需求書§三(八)"}
  failover_to_human: {rule: "系統異常時應能立即切換為人工客服且不影響正常運作", source: "契約§7(六)"}
  equipment_new: {rule: "決標日前1年內新品", source: "需求書備註4"}
  ndc_api_standard: {rule: "涉及共通性應用程式介面開發或整合者，應依國家發展委員會訂定之『共通性應用程式介面規範』辦理", source: "契約§2(四)", enforcement: "API 設計須符合國發會規範，並配合機關進行與其他資訊系統之介接作業"}
  personnel_fitness_check: {rule: "廠商人員須接受適任性查核", source: "契約附件10", enforcement: "全員簽署適任性查核同意書，含分包人員"}
  personal_data_protection: {rule: "旅客個資（電話/訂票/身分證）須採適當防護，外洩按筆數計罰", source: "服務水準表+個人資料保護法", enforcement: "個資去識別化/加密儲存/存取日誌/最小權限"}
  sensitive_data_protection: {rule: "機關敏感資料外洩或遭竄改按筆數計罰", source: "服務水準表", enforcement: "資料分級+加密+存取控制"}


