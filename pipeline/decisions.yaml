capacity_model:
  voice:
    monthly_calls: "20,000~35,000"
    peak_daily_calls: 1167             # 35000÷30
    peak_hourly_calls: 146             # 1167÷8（假設尖峰集中8小時）
    peak_concurrent: 30                # 146÷60×(平均3min通話)×峰值係數
    e1_lines_current: 1                # 30 B-channel
    e1_lines_max: 2                    # 系統支援最多2條
  text:
    monthly_queries: "4,000~6,000"
    peak_daily: 200
    peak_concurrent: 30
  sms:
    monthly: "2,500~7,000"
    peak_daily: 233
  backlog:
    monthly_cases: "600~700"
    annual: 8345
  agents:
    total_seats: 25
    supervisor_seats: 2
    concurrent_online: 15              # 60% 在線率（排班制）
    backoffice_users: 225
    backoffice_concurrent: 23          # 10% 同時在線

  performance_baseline:
    current_answer_rate: "83%"
    current_30s_pickup: "64%"
    current_digital_match: "93%"
    current_transfer_rate: "23%"
    target_improvement: "AI 介入後 30s 接聽率提升至 85%+"


# =============================================================
# SECTION H：架構決策記錄
# =============================================================

architecture_decisions:
  - id: AD-001
    decision: "六層式架構（基礎設施/平台安全/資料管理/AI服務/通道接入/使用者）"
    rationale: "隔離 AI 模組與既有系統，符合零衝擊要求"
  - id: AD-002
    decision: "GPU#0 專責 LLM 推論，GPU#1 負責 Embedding + QI + 擴充預留"
    rationale: "避免即時推論與批次任務搶資源，確保 5 秒回應 SLA"
  - id: AD-003
    decision: "STT/TTS 跑 CPU，不上 GPU"
    rationale: "串流推論適合 CPU 低延遲特性，GPU 留給 LLM"
  - id: AD-004
    decision: "LLM 選用 Llama 3.1 8B AWQ 量化，採 vLLM continuous batching"
    rationale: "8GB VRAM + 40GB KV Cache 緩衝，單卡 vLLM 實例支援 30 路並行。開源免授權費，無授權風險"
  - id: AD-005
    decision: "HA 採 Active-Active + Failover"
    rationale: "正常時 50/50 負載分攤，故障時單機承載 100%"
  - id: AD-006
    decision: "Docker Compose 部署，不用 K8s"
    rationale: "6~8 台伺服器規模不需要 K8s 複雜度，降低台鐵後續維運門檻"
  - id: AD-007
    decision: "SIP/RTP fork 方式介接既有語音系統"
    rationale: "不修改 MES Server 任何設定，AI-IVR 被動接收語音流"
  - id: AD-008
    decision: "所有技術選型優先開源方案"
    rationale: "符合授權到期後可續用要求，降低長期 TCO"


# =============================================================
# SECTION I：統一術語表
# =============================================================

glossary:
  "AI-IVR": "智慧語音應答系統 (AI Interactive Voice Response)"
  "STT": "語音識別系統 (Speech to Text)"
  "TTS": "語音合成系統 (Text to Speech)"
  "LLM": "大型語言模型 (Large Language Model)"
  "AI-Agent": "AI 虛擬客服 (AI Agent)"
  "AI-QI": "智慧質檢系統 (AI Quality Inspection)"
  "RAG": "檢索增強生成 (Retrieval-Augmented Generation)"
  "MES": "Media Exchange Server（既有話務分派與錄音伺服器）"
  "CRM GW": "CRM Gateway（既有數位客服閘道器）"
  "SBC": "Session Border Controller（網路電話邊界控制器）"
  "E1": "歐規數位中繼線（30 個 B-channel，每 channel 64kbps）"
  "SIP": "Session Initiation Protocol（會話初始協定）"
  "RTP": "Real-time Transport Protocol（即時傳輸協定）"
  "HA": "High Availability（高可用性雙機備援）"
  "VLAN": "Virtual LAN（虛擬區域網路）"
  "RPS": "Redundant Power Supply（冗餘電源供應器）"
  "BMC": "Baseboard Management Controller（伺服器管理控制晶片）"
  "KV Cache": "Key-Value Cache（LLM 推論時的注意力快取）"
  "VRAM": "Video RAM（GPU 顯示記憶體）"
  "AWQ": "Activation-aware Weight Quantization（模型量化技術）"
  "vLLM": "開源 LLM 推論引擎，支援 PagedAttention"
  "faster-whisper": "CTranslate2 加速版 Whisper 語音辨識引擎"
  "Qdrant": "Rust 語言開發的開源向量資料庫"
  "HNSW": "Hierarchical Navigable Small World（向量近鄰搜尋演算法）"
  "VAD": "Voice Activity Detection（語音活動偵測）"
  "TTFB": "Time to First Byte（首位元組延遲）"
  "WS": "值機平台 (WorkStation)（客服人員座席操作介面，含通話控制、AI 知識輔助、工單管理）"
  "ADM": "管理後台 (Admin)（系統管理介面，含參數設定、帳號權限、監控儀表板、日誌稽核）"
  "RBAC": "Role-Based Access Control（角色型存取控制）"
  "LDAP": "Lightweight Directory Access Protocol（輕量目錄存取協定，用於 AD 帳號驗證）"
