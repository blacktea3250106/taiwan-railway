# ============================================================
# 台鐵 AI 客服系統建置案 — 交付物合規查核表
# 案號：L0215P2010U
# 產出日期：2026-04-05
# 格式：A4 直式橫書，附頁次
# ============================================================

deliverables:

  - id: "01"
    name: "工作計畫書"
    deadline: "D+30 日曆天"
    payment_phase: "第一期 10%"
    required_items:
      - item: "履約範圍說明"
        description: "明確界定本案系統建置範圍，含 AI-IVR、AI-Agent、值機平台、管理後台、知識庫管理、質檢模組等各子系統邊界"
        source: "需求書第壹章、契約第 2 條"
      - item: "專案時程規劃（含里程碑）"
        description: "以甘特圖呈現各階段工作項目、起迄時間、里程碑節點，對應 4 期付款時程"
        source: "需求書交付時程表、契約第 5 條"
      - item: "專案組織與人力配置"
        description: "列出核心團隊成員姓名、角色、資歷、證照，含分包廠商團隊資訊"
        source: "契約第 8 條(六)、需求書人員資格要求"
      - item: "風險管理計畫"
        description: "識別專案風險、影響評估、因應對策、風險監控機制"
        source: "需求書工作計畫書內容要求"
      - item: "資安保密計畫"
        description: "依 CNS 27001 架構撰寫，涵蓋存取控制、加密機制、事件通報流程、日誌管理"
        source: "契約第 8 條(二十三)、附件 16"
      - item: "資料所在地說明"
        description: "明確宣告所有資料儲存於台鐵指定機房，地端部署，無跨境傳輸"
        source: "契約第 8 條(二十四)"
      - item: "跨境傳輸切結書"
        description: "正式切結書，承諾資料不跨境傳輸，含法律責任聲明"
        source: "契約第 8 條(二十四)、交付項目 1 要求"
      - item: "品質管理計畫"
        description: "文件審查流程、程式碼品質標準、變更管理程序"
        source: "需求書工作計畫書內容要求"
      - item: "溝通管理計畫"
        description: "定期會議頻率、溝通窗口、問題回報與追蹤機制"
        source: "需求書工作計畫書內容要求"
      - item: "分包計畫"
        description: "SI 分包廠商及資安分包廠商之名稱、範圍、資格證明，確認非陸資資訊服務業者"
        source: "契約第 8 條(六)1"
      - item: "人員適任性查核同意書"
        description: "全體團隊成員（含分包）簽署適任性查核同意書，確認全員中華民國籍"
        source: "契約附件 10、契約第 8 條(二十四)"
      - item: "保密同意書與保密切結書"
        description: "全體團隊成員雙重簽署，含離職後保密義務條款"
        source: "契約附件 8、附件 9"
    acceptance_criteria:
      - "涵蓋上述全部子項，無遺漏"
      - "資安保密計畫符合 CNS 27001 架構"
      - "跨境傳輸切結書格式正確且用印完成"
      - "全員適任性查核同意書、保密文件齊備"
      - "時程規劃與契約 4 期付款節點一致"
      - "文件格式 A4 直式橫書，附頁次，標註案號 L0215P2010U"

  - id: "02"
    name: "系統分析報告書（含需求規格說明）"
    deadline: "D+80 日曆天"
    payment_phase: "第二期 30%"
    required_items:
      - item: "系統功能需求規格"
        description: "逐模組列出功能需求，含 AI-IVR、AI-Agent、值機平台、管理後台、知識庫、質檢等各子系統功能清單"
        source: "需求書第貳章各節功能說明"
      - item: "介面需求規格"
        description: "系統間介接需求，含與台鐵既有系統（訂票系統、旅客服務系統等）之介面定義"
        source: "需求書系統整合介接要求"
      - item: "非功能需求規格"
        description: "效能（≤5 秒回應）、可用性（≥99%）、安全性、可維護性、相容性等需求"
        source: "需求書系統核心 KPI、服務水準表"
      - item: "需求追溯表"
        description: "建立需求追溯矩陣（RTM），每項功能需求對應需求書條文、設計元件、測試案例"
        source: "需求書系統分析報告書內容要求"
      - item: "使用案例分析"
        description: "主要使用情境之 Use Case 圖與描述，含旅客、值機員、督導、管理者角色"
        source: "需求書系統分析報告書內容要求"
      - item: "資料流程分析"
        description: "系統資料流程圖（DFD），標示資料來源、處理、儲存及傳輸路徑"
        source: "需求書系統分析報告書內容要求"
      - item: "值機平台功能需求"
        description: "座席操作介面、通話控制、AI 知識輔助、對話摘要與工單、督導監控與介入、座席狀態管理等功能需求"
        source: "需求書第貳章值機平台功能說明"
      - item: "管理後台功能需求"
        description: "系統參數設定、帳號與角色權限管理（AD/LDAP 整合）、系統監控儀表板、日誌與稽核、備份回復管理等功能需求"
        source: "需求書第貳章管理後台功能說明"
      - item: "系統邊界與限制"
        description: "明確界定系統功能邊界、已知限制、相依性說明"
        source: "需求書系統分析報告書內容要求"
    acceptance_criteria:
      - "功能需求涵蓋需求書所列全部模組（含值機平台與管理後台）"
      - "需求追溯表（RTM）完整，每項需求可追溯至來源條文"
      - "非功能需求明確量化，與契約 KPI 一致"
      - "介面需求含與台鐵既有系統之介接規格"
      - "經台鐵承辦單位確認需求無遺漏"

  - id: "03"
    name: "程式設計規格報告書"
    deadline: "D+80 日曆天"
    payment_phase: "第二期 30%"
    required_items:
      - item: "系統流程圖"
        description: "各子系統處理流程圖，含 AI-IVR 語音互動流程、AI-Agent 對話流程、值機員操作流程"
        source: "需求書程式設計規格報告書內容要求"
      - item: "元件設計說明"
        description: "系統架構之各元件（LLM、RAG、STT、TTS、SIP Gateway 等）設計規格與互動關係"
        source: "需求書程式設計規格報告書內容要求"
      - item: "資料庫設計"
        description: "ER 圖、資料表定義、索引規劃、資料保存策略（SMS 資料 ≥5 年、日誌 ≥6 個月）"
        source: "需求書資料保存要求、資安查核表"
      - item: "備份與回復機制設計"
        description: "資料備份策略、備份頻率、回復程序、HA 雙機備援切換機制"
        source: "需求書 HA 雙機備援要求"
      - item: "安全機制設計"
        description: "身分驗證、存取控制、加密傳輸、個資保護、防注入/防 XSS 等安全設計"
        source: "契約第 8 條(二十三)、附件 16 資安防護基準"
      - item: "API 設計規格"
        description: "各模組 API 介面定義，涉及共通性 API 者須依國發會規範辦理"
        source: "契約第 2 條(四)、需求書 API 清單要求"
    acceptance_criteria:
      - "系統流程圖涵蓋所有主要使用情境"
      - "資料庫設計滿足資料保存年限要求（SMS ≥5 年、日誌 ≥6 個月）"
      - "HA 雙機備援切換機制有明確設計"
      - "安全機制符合 CNS 27001 及資安防護基準"
      - "API 設計符合國發會共通性應用程式介面規範（如適用）"

  - id: "04"
    name: "教育訓練計畫書"
    deadline: "D+100 日曆天"
    payment_phase: "第二期 30%"
    required_items:
      - item: "訓練課程規劃"
        description: "課程大綱、授課時數分配、講師資歷、授課方式（現場實機操作為主）"
        source: "需求書教育訓練要求"
      - item: "值機人員訓練計畫"
        description: "≥36 小時訓練內容，含系統操作、AI 輔助功能使用、異常處理等課程"
        source: "需求書教育訓練時數要求"
      - item: "系統管理者訓練計畫"
        description: "≥18 小時訓練內容，含系統管理、知識庫維護、報表操作、監控管理等課程"
        source: "需求書教育訓練時數要求"
      - item: "教材規劃"
        description: "操作手冊、操作影片、FAQ 文件之製作規劃與交付格式"
        source: "需求書教育訓練教材要求"
      - item: "訓練時程與分批規劃"
        description: "Pilot 訓練（種子人員）與正式訓練（全員分批）之時程安排，確保不影響客服中心日常運作"
        source: "需求書教育訓練排程要求"
      - item: "訓練成效評估方式"
        description: "學員評量標準、滿意度調查、實作考核方式"
        source: "需求書教育訓練計畫書內容要求"
    acceptance_criteria:
      - "值機人員訓練時數合計 ≥36 小時"
      - "系統管理者訓練時數合計 ≥18 小時"
      - "總時數 ≥54 小時"
      - "教材清單完整（操作手冊、影片、FAQ）"
      - "分批排程合理，不影響客服中心運作"
      - "含訓練成效評估機制"

  - id: "05"
    name: "測試計畫書（含壓力測試及資安檢測）"
    deadline: "D+100 日曆天"
    payment_phase: "第二期 30%"
    required_items:
      - item: "測試策略與範圍"
        description: "單元測試、整合測試、系統測試、使用者驗收測試（UAT）之策略與範圍定義"
        source: "需求書測試計畫書內容要求"
      - item: "功能測試計畫"
        description: "各模組功能測試案例、預期結果、通過標準"
        source: "需求書測試計畫書內容要求"
      - item: "壓力測試計畫"
        description: "測試情境（≥30 埠語音同時通話、≥30 埠數位通道同時連線）、測試工具、通過標準"
        source: "需求書 AI-IVR ≥30 埠、AI-Agent ≥30 埠"
      - item: "AI 模型驗證計畫"
        description: "AI-IVR/AI-Agent 應答正確率 ≥85% 驗測方法（各 200 題）、STT 辨識率 ≥85% 驗測方法（200 音檔，中英 4:1）、後送分類 ≥85% 驗測方法（200 筆）"
        source: "需求書系統核心 KPI"
      - item: "弱點掃描計畫"
        description: "掃描工具、掃描範圍、掃描頻率、弱點分級與修復標準"
        source: "需求書測試計畫書、契約第 8 條(二十三)"
      - item: "滲透測試計畫"
        description: "測試方法論（如 OWASP Top 10）、測試範圍、測試團隊資格、報告格式"
        source: "需求書測試計畫書、契約第 8 條(二十三)"
      - item: "源碼檢測計畫"
        description: "檢測工具、檢測範圍（排除第三方元件原始碼）、弱點分級與修復標準"
        source: "需求書測試計畫書、契約第 8 條(二十三)"
      - item: "測試環境規劃"
        description: "測試環境架構、與正式環境之差異說明、測試資料準備方式"
        source: "需求書測試計畫書內容要求"
      - item: "測試排程"
        description: "各階段測試之執行時程、人力安排、台鐵配合事項"
        source: "需求書測試計畫書內容要求"
    acceptance_criteria:
      - "涵蓋弱點掃描、滲透測試、源碼檢測三項資安檢測之完整方法與排程"
      - "壓力測試情境符合契約埠數要求（語音 ≥30、數位 ≥30）"
      - "AI 驗測計畫之題數與配比符合契約規定"
      - "資安檢測團隊具備專業認證"
      - "測試排程可於 D+240 前完成全部測試"

  - id: "06"
    name: "軟硬體清單及系統架構圖"
    deadline: "D+180 日曆天"
    payment_phase: "第二期 30%"
    required_items:
      - item: "交貨清單對照表"
        description: "逐項列出所有交付之軟硬體品項、數量、規格、對應契約需求項次"
        source: "需求書軟硬體清單要求"
      - item: "硬體設備規格佐證"
        description: "各硬體設備之原廠規格書、產地證明（非大陸地區品牌及製造）"
        source: "需求書硬體規格備註、契約第 8 條(二十四)"
      - item: "軟體授權證明"
        description: "各軟體產品之授權文件、授權數量、授權期限、到期後可繼續使用聲明"
        source: "需求書軟體授權要求、契約軟體授權條款"
      - item: "第三方元件列冊"
        description: "系統使用之所有第三方元件清單，含名稱、版本、授權方式、產地來源"
        source: "需求書第三方元件列冊要求"
      - item: "系統架構圖"
        description: "整體系統架構圖、網路架構圖、HA 雙機備援架構圖、與台鐵既有系統介接架構圖"
        source: "需求書系統架構要求"
      - item: "設備配置圖"
        description: "機房設備配置圖（機櫃位置、網路連線、電力配置）"
        source: "需求書硬體安裝要求"
    acceptance_criteria:
      - "交貨清單與契約規格逐項對照無遺漏"
      - "全部硬體設備非大陸地區品牌及製造，具產地證明"
      - "全部軟體具合法授權證明"
      - "第三方元件清單完整，無大陸廠牌產品"
      - "架構圖含 HA 雙機備援設計"
      - "軟體授權到期後可繼續使用到期前最後更新版本之書面確認"

  - id: "07"
    name: "軟體使用及維護手冊"
    deadline: "D+180 日曆天"
    payment_phase: "第二期 30%"
    required_items:
      - item: "系統操作步驟"
        description: "各角色（值機員、督導、管理者）之系統操作步驟說明，逐步圖文並茂"
        source: "需求書軟體使用手冊內容要求"
      - item: "畫面截圖"
        description: "所有功能畫面之截圖說明，含欄位說明、操作提示"
        source: "需求書軟體使用手冊內容要求"
      - item: "常見問題集（FAQ）"
        description: "系統操作常見問題與解答，分類編排"
        source: "需求書軟體使用手冊內容要求"
      - item: "系統維護手冊"
        description: "系統管理者日常維護作業程序、備份回復操作、監控告警處理"
        source: "需求書軟體維護手冊內容要求"
      - item: "故障排除指引"
        description: "常見故障現象、診斷步驟、排除方式、異常時切換人工客服之操作程序"
        source: "需求書系統異常切換要求"
      - item: "網站下載功能"
        description: "手冊可於系統管理後台網站下載"
        source: "需求書軟體使用手冊交付方式"
    acceptance_criteria:
      - "操作步驟涵蓋全部系統功能"
      - "每項操作均附畫面截圖"
      - "FAQ 涵蓋至少 30 題常見問題"
      - "維護手冊含備份回復、監控、異常處理完整程序"
      - "含系統異常時切換人工客服之操作說明"
      - "手冊可於網站下載"
      - "全文繁體中文，無簡體中文字元"

  - id: "08"
    name: "系統上線執行計畫書"
    deadline: "D+180 日曆天"
    payment_phase: "第二期 30%"
    required_items:
      - item: "上線範圍定義"
        description: "本次上線之系統範圍、功能模組、使用者群組"
        source: "需求書系統上線計畫書內容要求"
      - item: "實施方法"
        description: "上線策略（大爆炸/分階段/平行運行）、資料移轉方式、系統切換方式"
        source: "需求書系統上線計畫書內容要求"
      - item: "執行步驟"
        description: "上線前準備、上線當日步驟、上線後監控之詳細步驟清單與時間表"
        source: "需求書系統上線計畫書內容要求"
      - item: "軟體版本說明"
        description: "上線版本號、版本異動紀錄、各元件版本對照"
        source: "需求書系統上線計畫書內容要求"
      - item: "回退計畫"
        description: "上線失敗時之回退步驟、判斷標準、回退後之系統狀態確認"
        source: "需求書系統上線計畫書內容要求"
      - item: "異常處理與人工切換計畫"
        description: "上線期間異常時立即切換人工客服系統之程序，確保不影響正常運作"
        source: "需求書系統異常切換要求"
      - item: "台鐵配合事項"
        description: "機房進出、網路設定、系統帳號開通等需台鐵配合之事項清單"
        source: "需求書系統上線計畫書內容要求"
    acceptance_criteria:
      - "上線步驟具體可執行，含時間表"
      - "含回退計畫與判斷標準"
      - "含異常時切換人工客服之完整程序"
      - "軟體版本資訊完整"
      - "台鐵配合事項清單明確"

  - id: "09"
    name: "測試報告書（含壓力測試及資安檢測）"
    deadline: "D+240 日曆天"
    payment_phase: "第三期 50%"
    required_items:
      - item: "UAT 測試紀錄"
        description: "使用者驗收測試執行紀錄、測試案例執行結果、缺陷追蹤與修復紀錄"
        source: "需求書測試報告書內容要求"
