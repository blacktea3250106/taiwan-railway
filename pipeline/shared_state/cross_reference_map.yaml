# ═══════════════════════════════════════════════════════════════
# 編號體系:
#   FR-{模組}-NNN  功能需求編號（對應 PRD 第五章）
#   TC-{模組}-NNN  測試案例編號（1:1 對應 FR）
#   M-{模組}-NN    軟體模組編號（程式設計規格）
#   P-{模組}-NN    程式編號（程式設計書）
#   AD-NNN         架構決策編號（decisions.yaml SECTION H）
#
# 模組代碼:
#   IVR = 智慧語音應答  STT = 語音識別  TTS = 語音合成
#   LLM = 大型語言模型  AGT = AI 虛擬客服  QI = 智慧質檢
