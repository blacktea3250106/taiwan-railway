architecture_decisions:
  - id: AD-001
    decision: "六層式架構（基礎設施/平台安全/資料管理/AI服務/通道接入/使用者）"
    rationale: "隔離 AI 模組與既有系統，符合零衝擊要求"
    impacts: [M-IVR-06, M-KB-02]

  - id: AD-002
    decision: "GPU#0 專責 LLM 推論，GPU#1 負責 Embedding + QI + 擴充預留"
    rationale: "避免即時推論與批次任務搶資源，確保 5 秒回應 SLA"
    impacts: [M-LLM-01, M-LLM-05, M-AGT-02, M-QI-01, M-QI-05]

  - id: AD-003
    decision: "STT/TTS 跑 CPU，不上 GPU"
    rationale: "串流推論適合 CPU 低延遲特性，GPU 留給 LLM"
    impacts: [M-STT-01, M-STT-02, M-STT-03, M-TTS-01, M-TTS-02, M-QI-02]

  - id: AD-004
    decision: "LLM 選用 Llama 3.1 8B AWQ 量化"
    rationale: "8GB VRAM，單卡可跑 6 實例，開源免授權費"
    impacts: [M-LLM-01, M-LLM-02, M-LLM-03, M-LLM-05, M-KB-01, M-AGT-03, M-AGT-04, M-AGT-06, M-IVR-02]

  - id: AD-005
    decision: "HA 採 Active-Active + Failover"
    rationale: "正常時 50/50 負載分攤，故障時單機承載 100%"
    impacts: [M-AGT-01, M-AGT-05, M-SMS-01]

  - id: AD-006
    decision: "Docker Compose 部署，不用 K8s"
    rationale: "6~8 台伺服器規模不需要 K8s 複雜度，降低台鐵後續維運門檻"
    impacts: []  # 影響全部模組之部署方式

  - id: AD-007
    decision: "SIP/RTP fork 方式介接既有語音系統"
    rationale: "不修改 MES Server 任何設定，AI-IVR 被動接收語音流"
    impacts: [M-IVR-01, M-IVR-03, M-IVR-04]

  - id: AD-008
    decision: "所有技術選型優先開源方案"
    rationale: "符合授權到期後可續用要求，降低長期 TCO"
    impacts: [M-KB-01, M-AGT-02]


