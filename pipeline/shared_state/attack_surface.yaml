# ═══════════════════════════════════════════════════════════════
# 攻擊面分析 — 7 位審查委員預判質疑清單
# 案號 L0215P2010U ｜ 台鐵 AI 客服系統建置案
# ═══════════════════════════════════════════════════════════════
# 嚴重度定義：
#   致命 — 回答不好直接影響評分，可能導致落選
#   重要 — 顯著扣分，但不致命
#   一般 — 委員可能提問但影響有限

attack_surface:

  # ═══════════════════════════════════════════════════════════
  # 李世芬（★ 最危險委員 — ISMS/PIMS/個資/資安/軟體工程）
  # ═══════════════════════════════════════════════════════════

  - id: ATK-001
    severity: 致命
    reviewer: 李世芬
    question: >
      旅客電話號碼、訂票紀錄、身分證字號等個資，在 STT 轉成文字後如何去識別化？
      你們有做個資影響評估（PIA）嗎？具體的去識別化技術方案是什麼？
    why_dangerous: >
      李世芬精通 PIMS/BS10012 個資保護標準，這是她的核心專長。
      STT 輸出的文字會包含旅客口述的身分證字號、電話號碼等個資，
      若無去識別化機制，等於在系統內留下明文個資。
    related_clarification: ["待釐清#3 知識庫範圍", "待釐清#12 質檢 STT 準確率"]
    target_docs:
      - "#2 系統分析報告書 — 新增「個資影響評估（PIA）」專節"
      - "#2 §非功能需求 — 個資保護架構"
      - "#5 測試計畫書 — 新增「個資保護測試」章節"
    defense: |
      1. 在 #2 加入 PIA 個資影響評估專節，列出所有個資欄位（電話/身分證/訂票紀錄）的蒐集目的、處理方式、保存期限
      2. STT 輸出文字即時套用正則表達式遮罩：身分證→A1234*****、電話→0912***789
      3. 對話紀錄儲存前強制去識別化，原始語音與去識別化文字分離存放
      4. 存取日誌記錄所有個資存取行為，保留 ≥6 個月
      5. #5 測試計畫加入個資保護測試案例：驗證去識別化效果、存取權限隔離

  - id: ATK-002
    severity: 致命
    reviewer: 李世芬
    question: >
      CNS 27001 的控制措施逐項對照表在哪裡？你們適用哪些控制項？
      資安防護基準查核表（附件 16）的每一項你們怎麼對應？
    why_dangerous: >
      她有 ISMS/ISO27001 實務經驗，會要求看到具體的控制措施對照，
      而非籠統地說「符合 CNS 27001」。
    related_clarification: ["待釐清#13 資安等級定位"]
    target_docs:
      - "#2 系統分析報告書 — 資安章節"
      - "#5 測試計畫書 — 資安檢測章節"
      - "#1 工作計畫書 — 資安管理策略"
    defense: |
      1. 在 #2 建立 CNS 27001 控制措施適用性聲明（SoA），逐項標註適用/不適用及實作方式
      2. 先與台鐵確認本案資安等級定位（待釐清#13），據此選用對應的防護基準
      3. 附件 16 查核表每一項對應到系統的具體實作元件（如：A.9 存取控制 → RBAC + AD 整合）
      4. #5 測試計畫包含弱點掃描、滲透測試、源碼檢測的具體工具與執行方法

  - id: ATK-003
    severity: 重要
    reviewer: 李世芬
    question: >
      AI 模型訓練如果用到旅客通話錄音，有取得旅客同意嗎？
      質檢系統用錄音做語音轉文字分析，這算不算個資的「特定目的外利用」？
    why_dangerous: >
      個資法要求蒐集個資須告知特定目的並取得同意，
      錄音原本用於客服品質管理，拿來訓練 AI 模型可能超出原始目的。
    related_clarification: ["待釐清#7 正確率判定標準"]
    target_docs:
      - "#2 系統分析報告書 — 資料治理章節"
      - "#1 工作計畫書 — 法遵說明"
    defense: |
      1. 明確聲明：本案 LLM 採用預訓練模型（Llama 3.1），不以旅客錄音進行模型訓練
      2. 知識庫更新僅使用台鐵提供的官方文件，不使用旅客對話內容
      3. 質檢系統使用錄音屬於「客服品質管理」原始目的範圍內，但轉寫文字須去識別化後方可用於統計分析
      4. 在系統 IVR 開場白加入「本通話可能經由 AI 系統協助處理」之告知語

  - id: ATK-004
    severity: 重要
    reviewer: 李世芬
    question: >
      APP 嵌入 AI-Agent 的方式是 SDK、WebView 還是 iframe？
      WebView 的 XSS 注入風險和中間人攻擊怎麼防護？
    why_dangerous: >
      她懂 APP 開發和資安，WebView 嵌入是已知的攻擊面。
    related_clarification: ["待釐清#11 App 嵌入方式"]
    target_docs:
      - "#2 系統分析報告書 — AI-Agent 整合架構"
      - "#3 程式設計規格報告書 — 前端安全"
      - "#5 測試計畫書 — 資安檢測"
    defense: |
      1. 先釐清台鐵 App 技術堆疊（待釐清#11），再決定嵌入方式
      2. 若採 WebView：強制 HTTPS、CSP 標頭、禁用 JavaScript Bridge 非必要功能
      3. 若採 iframe：設定 X-Frame-Options、sandbox 屬性
      4. #5 資安檢測包含 OWASP Mobile Top 10 掃描

  # ═══════════════════════════════════════════════════════════
  # 鄭國璽（電務處長 — E1/SIP/通訊）
  # ═══════════════════════════════════════════════════════════

  - id: ATK-005
    severity: 致命
    reviewer: 鄭國璽
    question: >
      你們怎麼接 E1？RTP fork 是什麼意思？會不會影響現有電話系統的通話品質？
      現有 1 條 E1 只有 30 個 B-channel，AI-IVR 要 ≥30 埠，加上人工客服同時用，通道夠嗎？
    why_dangerous: >
      電務處管 E1 專線和通訊設備，這是他的地盤。
      若 AI-IVR 介入導致現有電話系統異常，他要負責，所以會非常謹慎。
      待釐清#9 的 E1 通道容量問題直接命中他的核心關切。
    related_clarification: ["待釐清#1 MES 語音取得方式", "待釐清#9 E1 通道容量", "待釐清#16 WebCall SBC failover"]
    target_docs:
      - "#2 系統分析報告書 — 語音整合架構"
      - "#6 系統架構圖 — SIP/RTP 信令流程圖"
      - "#1 工作計畫書 — 機關配合事項"
    defense: |
      1. 畫到信令層級的 SIP/RTP 流程圖：E1 → VoIP Gateway → MES → RTP fork → AI-IVR
      2. 明確說明 RTP fork = 被動複製語音流，不攔截、不修改、不影響原始通話路徑
      3. E1 通道容量分析：30 B-channel 中，AI-IVR 接收的是 fork 副本，不佔用 B-channel
      4. 在 #1 機關配合事項列出需要電務處配合的項目（MES RTP fork 設定、E1 線路確認）
      5. 系統支援第二條 E1 擴充，但須另行評估是否需要

  - id: ATK-006
    severity: 重要
    reviewer: 鄭國璽
    question: >
      行政交換機（02-2381-5226）的類比線路轉 SIP 這段，你們測試過嗎？
      類比線路的語音品質轉成 SIP 後劣化多少？VAD 偵測會不會受影響？
    why_dangerous: >
      行政交換機是類比系統，類比→數位轉換的語音品質是實際問題。
    related_clarification: ["待釐清#8 行政交換機轉接路徑"]
    target_docs:
      - "#2 系統分析報告書 — 語音通道架構"
      - "#5 測試計畫書 — 語音品質測試"
    defense: |
      1. 在 #2 畫出行政交換機完整路徑：類比線路 → VoIP Gateway（G.711 編碼）→ MES → AI-IVR
      2. 說明 G.711 編碼在類比轉數位場景的品質表現（64kbps PCM，損失極小）
      3. #5 測試計畫包含行政分機語音品質專項測試（MOS 評分 ≥3.5）
      4. VAD 參數需針對類比線路背景雜訊進行調校

  - id: ATK-007
    severity: 重要
    reviewer: 鄭國璽
    question: >
      WebCall SBC 雙備援的 failover 機制是 VIP-based 還是 DNS-based？
      你們的 SIP Trunk 怎麼配合？兩台 SBC 切換時通話會不會斷？
    why_dangerous: >
      WebCall SBC 備援機制直接影響網頁電話的可用性。
    related_clarification: ["待釐清#16 WebCall SBC failover 機制"]
    target_docs:
      - "#2 系統分析報告書 — WebCall 介接架構"
      - "#6 系統架構圖 — HA 網路拓撲"
    defense: |
      1. 需求訪談時優先確認 SBC failover 機制（待釐清#16）
      2. AI-IVR 的 SIP UA 支援雙 SBC 註冊（Primary/Secondary），自動偵測並切換
      3. 切換期間進行中的通話由 MES 維持，AI-IVR 僅遺失該通的 AI 輔助，不中斷通話本身
      4. 架構圖標註 SBC failover 的具體切換時間目標（≤5 秒）

  # ═══════════════════════════════════════════════════════════
  # 陳榮彬（營業處長 — 旅客體驗/客服實效）
  # ═══════════════════════════════════════════════════════════

  - id: ATK-008
    severity: 致命
    reviewer: 陳榮彬
    question: >
      AI 回答錯誤導致旅客搭錯車或買錯票，責任歸屬怎麼算？
      85% 正確率代表每 100 通有 15 通答錯，這 15 通旅客怎麼辦？
    why_dangerous: >
      營業處長最怕的是客訴和媒體事件。15% 錯誤率在每月 2~3.5 萬通的量下，
      等於每月 3000~5000 通可能出錯，這是實際的業務風險。
    related_clarification: ["待釐清#7 正確率判定標準與裁定機制"]
    target_docs:
      - "#2 系統分析報告書 — AI 回應策略"
      - "#8 系統上線執行計畫書 — 風險緩解"
    defense: |
      1. AI 回應策略三層防線：信心度 ≥0.85 直接回答、0.6~0.85 回答+提示「建議洽人工確認」、<0.6 直接轉人工
      2. 涉及票價、時刻等關鍵資訊必須從 API 即時查詢，不依賴 LLM 記憶
      3. AI 回覆標註「本回覆由 AI 生成，如有疑問請按 0 轉接專人」
      4. 建立 AI 回答錯誤的快速修正機制：客服督導可即時標記錯誤答案，觸發知識庫更新
      5. 與台鐵協商「部分正確」的評分判定標準（待釐清#7），建議由雙方共同評分

  - id: ATK-009
    severity: 致命
    reviewer: 陳榮彬
    question: >
      春節疏運期間話務量暴增 2~3 倍，系統撐得住嗎？
      旅客問台語你聽得懂嗎？老人家不會講國語怎麼辦？
    why_dangerous: >
      春節是台鐵最繁忙的時段，話務量可能從日均 1167 通暴增到 3000+ 通。
      台鐵旅客中有大量年長者慣用台語，這是實際的使用場景。
    related_clarification: []
    target_docs:
      - "#2 系統分析報告書 — 容量規劃/尖峰處理策略"
      - "#5 測試計畫書 — 壓力測試"
    defense: |
      1. 尖峰話務處理策略：AI-IVR 處理簡單查詢（時刻/票價），複雜問題快速轉人工，釋放人工座席處理更多來電
      2. 壓力測試目標設定為尖峰日量的 2 倍（2334 通/日），驗證系統不降級
      3. 台語問題誠實說明：Whisper large-v3 支援台語摻雜國語的混合辨識，但純台語辨識率較低
      4. 純台語來電的處理策略：偵測到非國語語音超過 3 輪後，自動轉接人工客服
      5. 未來可擴充台語專用模型（如 Whisper fine-tune），但不在本案範圍內

  - id: ATK-010
    severity: 重要
    reviewer: 陳榮彬
    question: >
      轉接真人客服的等待時間會不會反而更長？
      AI 處理不了的都丟給人工，人工客服會不會更忙？
    why_dangerous: >
      如果 AI 只是把「難題」都轉給人工，反而加重人工負擔，違背建置初衷。
    related_clarification: []
    target_docs:
      - "#2 系統分析報告書 — 轉接策略與排隊機制"
    defense: |
      1. 量化 AI 分流效益：預估 AI 可獨立處理 60~70% 的簡單查詢（時刻/票價/車站資訊），釋放人工處理複雜案件
      2. 轉接時附帶 AI 對話摘要，人工客服不需重複問診，預估節省 30~60 秒/通
      3. 提供即時儀表板監控 AI 轉人工比例，若超過閾值自動告警
      4. AI 回答的「部分正確」也算有效服務，旅客得到初步方向後可能不需轉人工

  # ═══════════════════════════════════════════════════════════
  # 劉傳彥（數位發展處長 — 系統穩定/維運接手）
  # ═══════════════════════════════════════════════════════════

  - id: ATK-011
    severity: 致命
    reviewer: 劉傳彥
    question: >
      保固期結束後，我們自己能維護這套系統嗎？
      Docker Compose、GPU 伺服器、LLM 模型更新，我們的人會操作嗎？
      Coqui TTS 公司已經倒了，未來出問題找誰？
    why_dangerous: >
      數位發展處是接手維運的單位，如果保固後接不住，他要扛責任。
      Coqui AI 已停業是已知風險，他一定會問。
    related_clarification: ["待釐清#6 保固期起算與範圍"]
    target_docs:
      - "#4 教育訓練計畫書 — 管理者培訓"
      - "#7 軟體使用及維護手冊"
      - "#12 教育訓練執行報告書"
    defense: |
      1. 教育訓練 ≥54 小時中，管理者培訓 ≥18 小時須涵蓋：Docker 基本操作、GPU 監控、模型更換流程、日常巡檢 SOP
      2. #7 維護手冊以「台鐵 IT 人員」為讀者，提供 step-by-step 操作指引，避免開發者行話
      3. Coqui XTTS-v2 風險管控：模型已開源（MPL 2.0），原始碼與權重可永久使用；備案方案 MeloTTS / Piper 已驗證可行
      4. 建議台鐵在保固期間安排 2~3 位人員「跟班實作」，實際操作所有維運流程
      5. 保固期起算與年限須在契約釐清階段確認（待釐清#6）

  - id: ATK-012
    severity: 重要
    reviewer: 劉傳彥
    question: >
      GPU 伺服器的功耗和散熱需求多少？我們機房的電力和空調夠嗎？
      這套系統加進來，不會影響我們現有客服系統吧？
    why_dangerous: >
      L40S GPU 單卡 TDP 350W，雙卡加主機可能 1500~2000W，
      機房電力和空調是實際限制。
    related_clarification: []
    target_docs:
      - "#1 工作計畫書 — 機房環境需求"
      - "#6 軟硬體清單及系統架構圖 — 電力/散熱需求"
    defense: |
      1. 在 #1 提供精確的電力需求估算：AI 伺服器×2 約 2000W×2 = 4000W，全系統（含 IVR/管理伺服器）約 8000~10000W
      2. 散熱需求換算 BTU，供台鐵評估機房空調餘裕
      3. 42U 機櫃的位置、電力迴路、網路佈線需求，在 #1 機關配合事項中列出
      4. 反覆強調「不修改現有 MES Server 設定」= 不影響既有系統，AI-IVR 為新增獨立模組

  # ═══════════════════════════════════════════════════════════
  # 丁立邁（捷運局退休 — 專案管理/網路架構）
  # ═══════════════════════════════════════════════════════════

  - id: ATK-013
    severity: 重要
    reviewer: 丁立邁
    question: >
      你們的 WBS 展開到第幾層？270 天的關鍵路徑在哪？
      人力甘特圖攤開來看，6 個人跑得過嗎？
      有沒有做過類似規模的交通運輸資訊系統？
    why_dangerous: >
      捷運局出身，看過大型交通資訊系統的專案管理，標準很高。
      270 天要完成從設計到上線，時程非常緊。
    related_clarification: []
    target_docs:
      - "#1 工作計畫書 — WBS/甘特圖/關鍵路徑"
    defense: |
      1. WBS 至少展開到第三層，每個工作包標註負責人、工時估算、前置依賴
      2. 關鍵路徑標示：需求訪談(D+30~50) → 系統開發(D+80~180) → 整合測試(D+180~240) 是最緊的鏈
      3. 人力配置表含技能矩陣，說明核心角色（架構師/AI 工程師/前端/SIP 專家）的具體分工
      4. 每期交付物預留 5~7 天修正 buffer
      5. 團隊實績表列出類似案例（若有交通運輸相關經驗優先呈現）

  - id: ATK-014
    severity: 重要
    reviewer: 丁立邁
    question: >
      HA 切換在網路層怎麼實現？用 Keepalived？VIP？
      Active-Active 的負載分攤具體怎麼做？Session 黏著還是無狀態？
    why_dangerous: >
      他懂網路管理，會追問 HA 的網路層實現細節。
    related_clarification: []
    target_docs:
      - "#2 系統分析報告書 — HA 架構設計"
      - "#6 系統架構圖 — 網路拓撲"
    defense: |
      1. HA 方案：Keepalived + VIP，Active-Active 雙機透過 VIP 接收流量
      2. 負載分攤方式：SIP 層以 Round-Robin 分配新通話，HTTP 層以 Nginx 反向代理
      3. Session 策略：Redis 共享 Session，任一台故障，Session 不遺失
      4. Failover 自動偵測：Keepalived VRRP 心跳 ≤2 秒偵測、≤5 秒完成切換
      5. 網路拓撲圖標註 VLAN 隔離：管理 VLAN、服務 VLAN、資料 VLAN 分離

  # ═══════════════════════════════════════════════════════════
  # 江美琦（國發會退休 — 政府標案/共構/開源風險）
  # ═══════════════════════════════════════════════════════════

  - id: ATK-015
    severity: 重要
    reviewer: 江美琦
    question: >
      開源軟體的長期維護策略是什麼？Coqui AI 已經倒了，
      Whisper 和 Llama 的社群活躍度如何證明？
      如果這些開源專案停止維護，備案方案是什麼？
    why_dangerous: >
      行政院級別的資訊統籌經驗，看過太多政府案用開源軟體踩雷。
    related_clarification: []
    target_docs:
      - "#2 系統分析報告書 — 技術選型風險分析"
      - "#1 工作計畫書 — 開源軟體管理策略"
    defense: |
      1. 開源風險管控專章，每個元件列出：授權類型、社群活躍度指標（GitHub Stars/Contributors/最近提交日期）、商業支持選項
      2. 備案方案矩陣：
         - Coqui XTTS-v2 → 備案 MeloTTS / Piper（已驗證）
         - Whisper → 備案 faster-whisper 社群 fork（獨立維護中）
         - Llama → 備案 Mistral / Qwen（非陸籍公司版本）
      3. 強調「契約要求授權到期可續用」+ 開源授權 = 永久可用，這正是選擇開源的原因
      4. 所有開源元件的原始碼納入 #11 光碟交付，確保台鐵保有完整原始碼

  - id: ATK-016
    severity: 重要
    reviewer: 江美琦
    question: >
      這套系統的 API 有沒有依照國發會「共通性應用程式介面規範」辦理？
      未來如果交通部其他所屬機關要共用，架構支不支援？
    why_dangerous: >
      國發會出身，共通性 API 規範是她參與制定的政策，一定會問。
      契約第 2 條(四)也明確要求。
    related_clarification: []
    target_docs:
      - "#2 系統分析報告書 — API 設計章節"
      - "#3 程式設計規格報告書 — API 規格"
    defense: |
      1. API 設計遵循國發會共通性 API 規範：RESTful、JSON、OAuth 2.0 認證、版本控制（/v1/）
      2. API 文件採 OpenAPI 3.0 規格撰寫，提供 Swagger UI 供測試
      3. 架構設計預留多租戶擴展可能性，但明確說明本案範圍為台鐵單一機關使用
      4. 在 #2 加入國發會 API 規範符合性對照表

  # ═══════════════════════════════════════════════════════════
  # 林竣曜（專門委員 — 契約/履約/採購法規）
  # ═══════════════════════════════════════════════════════════

  - id: ATK-017
    severity: 重要
    reviewer: 林竣曜
    question: >
      13 份交付物的審查流程和修正週期怎麼規劃？
      如果某份交付物被退件修正，會不會連鎖影響後續付款時程？
      分包比例多少？核心工作有沒有自己做？
    why_dangerous: >
      專門委員管契約履約，最怕逾期違約和分包合規問題。
    related_clarification: ["待釐清#6 保固期起算"]
    target_docs:
      - "#1 工作計畫書 — 交付時程與審查規劃"
    defense: |
      1. 每份交付物標註：預計撰寫完成日、內部審查日、提交日、預留修正天數（5~7天/回合、最多2回合）
      2. 交付相依性分析：標示哪些交付物可平行作業、哪些有前後依賴
      3. 分包策略清晰標示：核心工作（AI 模型/系統架構/整合）自做，分包項目（硬體安裝/教育訓練場地）及比例
      4. 分包廠商隨 #1 提交：非陸資聲明、專業資格證明、人員適任性查核同意書

  - id: ATK-018
    severity: 一般
    reviewer: 林竣曜
    question: >
      逾期違約金怎麼算？你們的時程有足夠的緩衝嗎？
      契約變更的程序你們清楚嗎？
    why_dangerous: >
      標準的履約管理關切，但 270 天的時程確實很緊。
    related_clarification: []
    target_docs:
      - "#1 工作計畫書 — 風險管理"
    defense: |
      1. 時程風險分析：識別前三大風險（需求訪談延遲、硬體到貨延遲、介接規格變更）及緩解措施
      2. 每期付款里程碑前預留 buffer，第二期（D+80~180）最密集，需特別管控
      3. 契約變更程序納入 #1 專案管理章節，標註觸發條件與流程

  # ═══════════════════════════════════════════════════════════
  # 跨委員共同關切 — 來自待釐清清單的攻擊面
  # ═══════════════════════════════════════════════════════════

  - id: ATK-019
    severity: 致命
    reviewer: 劉傳彥
    question: >
      CRM Gateway 的 API 規格你們拿到了嗎？
      訂票紀錄查詢系統、時刻表查詢系統的 API 規格都還沒提供，
      你們怎麼保證能在 270 天內完成整合？
    why_dangerous: >
      數位發展處管這些系統的 API，如果他們自己都還沒準備好規格，
      廠商就無法開發，這是專案延遲的最大風險。
    related_clarification: ["待釐清#2 CRM API 規格", "待釐清#10 訂票/時刻表 API"]
    target_docs:
      - "#1 工作計畫書 — 機關配合事項與風險管理"
      - "#2 系統分析報告書 — 系統介接規格"
    defense: |
      1. 在 #1 機關配合事項明確列出：API 規格文件須於 D+30 前提供，否則影響 D+80 系統分析交付
      2. 介接層採用 Adapter Pattern，API 規格變更時只需修改 Adapter，不影響核心邏輯
      3. 提出「Mock API 先行」策略：在正式 API 規格到位前，以 Mock 介面進行開發與測試
      4. 風險登記表標註：「API 規格延遲」為高風險項目，觸發時啟動契約變更程序

  - id: ATK-020
    severity: 重要
    reviewer: 陳榮彬
    question: >
      知識庫到底包含什麼？有多少資料？多久更新一次？
      如果知識庫不齊全，AI 答不出來的比例會不會很高？
    why_dangerous: >
      知識庫是 AI 回答品質的基礎，如果台鐵沒準備好知識庫內容，
      85% 正確率根本達不到。
    related_clarification: ["待釐清#3 知識庫範圍與格式"]
    target_docs:
      - "#1 工作計畫書 — 機關配合事項"
      - "#2 系統分析報告書 — 知識庫架構"
    defense: |
      1. 在 #1 機關配合事項列出：台鐵須於 D+50 前提供知識庫種子資料（FAQ、SOP、規章）
      2. 知識庫架構設計支援增量更新，台鐵可自行維護內容
      3. 知識庫覆蓋率指標：驗收前統計「AI 回答來源命中知識庫」的比例
      4. 知識庫不足時的降級策略：AI 誠實回覆「此問題建議洽詢專人」，不瞎編答案

  - id: ATK-021
    severity: 重要
    reviewer: 鄭國璽
    question: >
      SMS 簡訊收發裝置到底是閘道器還是行動裝置？
      4G LTE 模組的品牌產地有沒有問題？不會是大陸製的吧？
    why_dangerous: >
      電務處管通訊設備，SMS 裝置的型態和產地合規是他的關切。
      4G LTE 模組很多是大陸製造，觸及合規紅線。
    related_clarification: ["待釐清#4 SMS 裝置型態"]
    target_docs:
      - "#6 軟硬體清單 — SMS 裝置規格"
    defense: |
      1. 需求訪談時確認 SMS 裝置型態（待釐清#4），明確是 SMS Gateway 或行動裝置方案
      2. 硬體清單逐項標註品牌、產地、LTE 模組型號，確保非大陸品牌/製造
      3. 建議採用台灣/日本/韓國品牌的 SMS Gateway（如：陽慶、Quectel 台灣產線）
      4. SMS 紀錄保留 ≥5 年的儲存空間估算納入 #6

  - id: ATK-022
    severity: 一般
    reviewer: 丁立邁
    question: >
      L40S GPU「或同等品」的等效基準是什麼？
      如果用其他 GPU，VRAM 和推論效能怎麼驗證等效？
    why_dangerous: >
      標案常見的「同等品」爭議，可能影響硬體採購和驗收。
    related_clarification: ["待釐清#5 同等品 GPU 認定標準"]
    target_docs:
      - "#6 軟硬體清單 — GPU 規格"
      - "#1 工作計畫書 — 同等品認定基準"
    defense: |
      1. 定義 GPU 同等品基準：VRAM ≥48GB、FP16 ≥362 TFLOPS、支援 NVLink
      2. 提供 Benchmark 驗證方法：以 vLLM 跑 Llama 3.1 8B AWQ，throughput ≥ L40S 的 95%
      3. 同等品須為非大陸品牌/製造，目前市場上符合條件的替代：NVIDIA A6000（48GB）

  - id: ATK-023
    severity: 重要
    reviewer: 李世芬
    question: >
      後送案件系統目前有 225 位外點同仁在使用，
      你們的 AI 後送分析功能會不會影響他們的操作介面？
      這 225 人需不需要重新培訓？
    why_dangerous: >
      影響 225 位現有使用者的風險，涉及變更管理和使用者體驗。
    related_clarification: ["待釐清#14 後送系統整合範圍"]
    target_docs:
      - "#2 系統分析報告書 — 後送系統整合"
      - "#4 教育訓練計畫書"
    defense: |
      1. 需求訪談時確認整合範圍（待釐清#14）：AI 後送分析是獨立模組，還是嵌入現有後送系統介面
      2. 建議方案：AI 分析結果透過 API 推送至現有後送系統，不修改現有操作介面
      3. 若需嵌入介面，教育訓練須涵蓋外點人員（但 225 人的培訓規模需額外評估）
      4. 在 #2 明確標示「AI 後送分析」的系統邊界

  - id: ATK-024
    severity: 重要
    reviewer: 江美琦
    question: >
      你們的文件格式有沒有嚴格依照政府資訊系統開發指引？
      A4 直式橫書、頁次、案號，這些基本的有做到嗎？
      全文有沒有出現簡體中文？AI 生成的內容也要檢查。
    why_dangerous: >
      她看過無數政府標案文件，對格式規範非常敏感。
      AI 生成的繁體中文有時會夾帶簡體字或大陸用語（如「軟件」「服務器」）。
    related_clarification: []
    target_docs:
      - "所有 13 份交付物"
    defense: |
      1. 建立文件模板，統一 A4 直式橫書、頁首含案號 L0215P2010U、自動頁次
      2. 所有文件交付前跑「簡體中文偵測腳本」，掃描簡體字元和大陸慣用語
      3. AI 生成內容的品質管控 SOP：人工審閱 → 用語校正 → 格式校正 → 交付
      4. 禁用詞清單：軟件→軟體、服務器→伺服器、數據庫→資料庫、信息→資訊 等


