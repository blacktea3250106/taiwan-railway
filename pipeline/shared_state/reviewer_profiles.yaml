# ═══════════════════════════════════════════════════════════════
# 評審委員側寫 — 用於 Act 1.5 攻擊面預判
# ═══════════════════════════════════════════════════════════════
# 每位委員的背景決定了他們會從什麼角度提問
# 文件撰寫時要確保每個角度都有防禦

reviewers:
  # ── 外部委員（3 位，退休政府資訊主管）────────────────────

  - name: "丁立邁"
    background: "台北捷運局 資訊處長/副主任/課長（退休）"
    education: "政大 EMBA 資管組碩士"
    expertise:
      - "資訊管理"
      - "系統發展"
      - "專案管理"
      - "網路管理"
      - "資訊安全策略"
    likely_focus: |
      捷運局出身，對「大型交通運輸資訊系統」非常熟悉。
      會關注：專案管理方法論是否紮實、時程是否合理、
      網路架構安全性、系統可用性（捷運系統也是 24/7）。
    predicted_questions:
      - "你們的 WBS 展開到第幾層？關鍵路徑在哪？"
      - "270 天 6 個人，人力甘特圖跑得過嗎？"
      - "HA 切換機制在網路層怎麼實現？VIP? Keepalived?"
      - "你們有做過類似規模的交通運輸資訊系統嗎？"
    defense_strategy: |
      #1 工作計畫書的 WBS 和甘特圖要做到捷運局等級的精細度。
      網路架構要畫清楚 VLAN 隔離和 HA 切換的網路層實現。

  - name: "江美琦"
    background: "行政院研考會→國發會→科技部（退休）"
    education: "嘉義大學管理學系碩士"
    expertise:
      - "共構機房規劃建置"
      - "政府資訊系統統籌規劃"
      - "辦公室自動化"
    likely_focus: |
      行政院級別的資訊統籌規劃經驗，看過無數政府標案。
      會關注：是否符合政府資訊系統開發標準、共構機房的相容性、
      與其他政府系統的介接可能性、文件是否符合規範格式。
    predicted_questions:
      - "你們的文件格式有沒有依照政府資訊系統開發指引？"
      - "這套系統未來能不能跟其他交通部所屬機關共用？"
      - "機房空間規劃有考慮到共構需求嗎？"
      - "開源軟體的長期維護策略？政府用開源的風險管控？"
    defense_strategy: |
      文件格式必須嚴格遵守政府規範（A4 直式橫書）。
      在 #1 或 #2 中提到系統的「可擴展性」和「共構相容性」。
      開源軟體的風險要有專章說明（社群活躍度、備案方案）。

  - name: "李世芬"
    background: "台北市停管處/交通局（退休）"
    education: "銘傳大學資管碩士"
    expertise:
      - "軟體工程"
      - "資訊安全策略與實務"
      - "ISMS/ISO 27001"
      - "PIMS/BS10012 個資保護"
      - "大數據分析"
      - "智慧交通 ITS"
      - "APP"
    likely_focus: |
      ★ 最危險的委員 ★
      同時精通資安（ISMS/ISO27001）和個資保護（PIMS/BS10012），
      又懂軟體工程和大數據。會從資安和個資角度深入追問。
      也懂 APP 開發，會關注 RWD 和 APP 的體驗。
    predicted_questions:
      - "個資影響評估(PIA)做了嗎？旅客電話號碼怎麼保護？"
      - "CNS 27001 的哪些控制措施適用？逐項對照在哪？"
      - "STT 把語音轉成文字後，文字紀錄的去識別化策略？"
      - "AI 模型訓練如果用到旅客錄音，有取得同意嗎？"
      - "後送案件的大數據分析有個資風險嗎？"
      - "APP 嵌入 AI-Agent 的資安防護？WebView 注入風險？"
    defense_strategy: |
      ★ 必須在 #2 非功能需求加入「個資影響評估」專節 ★
      ★ 必須在 #5 測試計畫加入「個資保護測試」 ★
      STT 轉出的文字必須說明去識別化機制。
      AI 模型訓練用的錄音必須說明脫敏流程。
      APP/WebView 的安全防護要有專段說明。

  # ── 內部委員（4 位，台鐵公務員）─────────────────────────

  - name: "陳榮彬"
    background: "台鐵 營業處處長"
    expertise: ["營業管理", "票務", "旅客服務"]
    likely_focus: |
      營業處管客服中心，他是「甲方老闆」。
      最在意的是：AI 客服能不能真的減輕客服人員負擔、
      旅客體驗好不好、會不會出包影響營收。
    predicted_questions:
      - "AI 回答錯誤導致旅客投訴，責任歸屬怎麼算？"
      - "春節疏運期間話務量暴增 3 倍，系統撐得住嗎？"
      - "旅客問台語你聽得懂嗎？"
      - "轉接真人的等待時間會不會反而更長？"
    defense_strategy: |
      在 AI-IVR 的功能需求中必須有「尖峰話務處理策略」。
      生成式 AI 的回答必須標註「本回覆由 AI 生成」（需求書已要求）。
      台語問題要有專段說明（Whisper 可辨識台語摻雜的國語）。

  - name: "劉傳彥"
    background: "台鐵 數位發展處處長"
    expertise: ["資訊系統", "數位轉型", "機房管理"]
    likely_focus: |
      數位發展處是本案的承辦單位，他是「技術甲方」。
      最在意的是：系統能不能穩定運行、維運難不難、
      會不會把機房搞爆、保固後他的團隊接不接得住。
    predicted_questions:
      - "Docker Compose 我們的人會維護嗎？有培訓嗎？"
      - "GPU 伺服器的散熱量我們機房受得了嗎？"
      - "保固期後模型要更新，我們自己能操作嗎？"
      - "你這套系統加進來，不會影響我們現有客服吧？"
    defense_strategy: |
      #7 使用維護手冊必須寫到「台鐵 IT 人員看得懂」的程度。
      教育訓練必須包含「系統管理者培訓」，讓他的人能接手。
      電力/散熱需求要在 #1 就提供數字讓他提前確認。
      「不影響既有系統」要在 #2 架構章反覆強調。

  - name: "林竣曜"
    background: "台鐵 專門委員"
    expertise: ["行政管理", "契約履約管理", "採購法規"]
    likely_focus: |
      專門委員通常協助處長層級處理行政與契約事務，
      會關注：履約進度管控、分包管理合規性、違約風險、
      文件時效性（是否按期交付）、預算執行率。
      也可能代替處長追問文件格式是否符合政府採購規範。
    predicted_questions:
      - "逾期違約金怎麼算？你們有信心不逾期嗎？"
      - "分包比例多少？核心工作有沒有自己做？"
      - "分包廠商的資格審查文件備齊了嗎？"
      - "13 份交付物的審查流程和修正週期怎麼規劃？"
      - "如果某份交付物被退件，會不會影響後續付款時程？"
      - "契約變更的程序你們清楚嗎？"
    defense_strategy: |
      #1 時程規劃要有明確的 buffer（建議每期預留 5~7 天修正期）。
      分包策略要清楚標示「核心自做」vs「分包項目」及比例。
      每份交付物標註預計交付日、審查預留天數、修正回合上限。
      分包廠商資格證明文件（非陸資聲明、專業認證）隨 #1 一併提交。

  - name: "鄭國璽"
    background: "台鐵 電務處處長"
    expertise: ["電務", "通訊", "號誌系統"]
    likely_focus: |
      電務處管通訊系統，E1 專線、行政交換機可能都歸他管。
      會關注：SIP/E1 介接會不會影響現有通訊、
      RTP 語音流的品質、與行政交換機的相容性。
    predicted_questions:
      - "你們怎麼接 E1？會影響現有電話系統嗎？"
      - "SIP Trunk 的設定誰來做？需要我們電務處配合什麼？"
      - "網路電話 WebCall 的語音品質能保證嗎？"
      - "行政交換機的類比線路轉 SIP 有測試過嗎？"
    defense_strategy: |
      SIP/E1 介接方案必須畫到信令層級的流程圖。
      必須明確說明「不修改現有 MES Server 設定」。
      行政交換機的類比→SIP 轉換要有專段說明。
      需要電務處配合的事項要在 #1 機關配合事項中列出。


# ═══════════════════════════════════════════════════════════════
# 攻擊面總結：按嚴重度排序的 Top 風險
# ═══════════════════════════════════════════════════════════════

top_risks_by_reviewer:
  fatal:
    - reviewer: "李世芬"
      risk: "個資保護不足（她精通 PIMS/BS10012，一定會追問）"
      defense: "加入 PIA 個資影響評估、STT 文字去識別化、錄音脫敏"
    - reviewer: "陳榮彬"
      risk: "AI 出錯影響旅客體驗（他是營業處老闆）"
      defense: "AI 回答標註來源、錯誤回應自動轉人工、滿意度監控"
    - reviewer: "鄭國璽"
      risk: "E1/SIP 介接影響現有通訊（他管電務）"
      defense: "RTP fork 被動接收、不改 MES 設定、介接測試計畫"
  important:
    - reviewer: "丁立邁"
      risk: "專案管理不夠紮實（捷運局等級的標準）"
      defense: "WBS 三層展開、關鍵路徑分析、人力甘特圖"
    - reviewer: "劉傳彥"
      risk: "保固後台鐵接不住（他的團隊要維運）"
      defense: "維護手冊要簡單易懂、管理者培訓要充足"
    - reviewer: "江美琦"
      risk: "開源軟體長期風險（她看過太多政府案）"
      defense: "開源風險管控專章、社群活躍度證明、備案方案"
